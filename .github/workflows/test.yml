name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Hook tests
        run: |
          bash tests/hooks/caliper-test_safe_commands.sh
          bash tests/hooks/caliper-test_permission_request.sh
          bash tests/hooks/caliper-test_permission_request_safe_bash.sh

      - name: Validate-plan tests
        run: |
          bash tests/validate-plan/caliper-test_schema.sh
          bash tests/validate-plan/caliper-test_e2e.sh
          bash tests/validate-plan/caliper-test_render.sh
          bash tests/validate-plan/caliper-test_update_status.sh
          bash tests/validate-plan/caliper-test_criteria.sh
